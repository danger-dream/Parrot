name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # 注意：GHCR 镜像名必须全小写；本仓库发布为 ghcr.io/<owner>/parrot
  IMAGE_NAME: ${{ github.repository_owner }}/parrot

jobs:
  # ── 版本号变更检测 ──────────────────────────────────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: diff
        run: |
          # tag 推送 / 手动触发 → 始终构建
          if [[ "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # push main → 对比前后 commit 的 __version__
          NEW_VER=$(grep -oP '__version__\s*=\s*"\K[^"]+' src/__init__.py || echo '')
          OLD_VER=$(git show HEAD~1:src/__init__.py 2>/dev/null | grep -oP '__version__\s*=\s*"\K[^"]+' || echo '')
          if [[ "$NEW_VER" != "$OLD_VER" ]]; then
            echo "Version changed: $OLD_VER → $NEW_VER"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged ($NEW_VER), skipping build"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  # ── 构建 & 推送 ─────────────────────────────────────────────────
  build-and-push:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # main 分支 → latest；vX.Y.Z 标签 → X.Y.Z / X.Y / X；每次 commit 也带 sha-xxxxxxx
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
